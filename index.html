<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0e1014"/>
<title>DustCart Pro – 3D Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0e1014;
  color:#e6edf3;font-family:'Segoe UI',sans-serif;touch-action:none}
canvas{display:block;width:100%!important;height:100%!important;
  position:fixed;top:0;left:0;touch-action:none}

/* ── safe-area padding for iPhone notch / home bar ── */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;
  padding:env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ── HEADER ── */
#hdr{position:absolute;top:0;left:0;right:0;
  padding:max(12px,env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(8,9,12,.95)0%,transparent 100%)}
#hdr h1{font-size:clamp(.95rem,4vw,1.35rem);font-weight:800;line-height:1.1}
#hdr h1 em{color:#4caf50;font-style:normal}
#hdr p{font-size:clamp(.55rem,2.5vw,.68rem);color:#8b949e;margin-top:2px}
#badge{background:#4caf50;color:#fff;font-size:clamp(.5rem,2vw,.6rem);
  font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;
  white-space:nowrap;flex-shrink:0;margin-left:8px}

/* ── PARTS PANEL — hidden on mobile by default, toggle via ☰ ── */
#panel{position:absolute;top:0;left:0;bottom:0;
  background:rgba(8,9,12,.97);border-right:1px solid #2a3040;
  padding:max(60px,env(safe-area-inset-top)+46px) 12px 24px;
  width:min(200px,72vw);backdrop-filter:blur(20px);
  pointer-events:all;overflow-y:auto;
  transform:translateX(-100%);transition:transform .28s ease;z-index:20}
#panel.open{transform:translateX(0)}
#panel h3{font-size:.58rem;text-transform:uppercase;letter-spacing:2px;
  color:#8b949e;margin-bottom:8px}
.pb{display:flex;align-items:center;gap:8px;width:100%;background:transparent;
  border:1px solid transparent;border-radius:6px;color:#e6edf3;
  font-size:clamp(.68rem,3vw,.76rem);cursor:pointer;
  padding:8px 8px;margin-bottom:3px;transition:all .15s;text-align:left;
  min-height:40px}
.pb:hover,.pb:active{background:rgba(76,175,80,.14);border-color:#4caf50}
.pb.on{background:rgba(76,175,80,.22);border-color:#4caf50;color:#4caf50}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── MENU TOGGLE (hamburger) — top-left ── */
#menuBtn{position:absolute;top:max(10px,env(safe-area-inset-top));left:10px;
  background:rgba(8,9,12,.90);border:1px solid #2a3040;border-radius:8px;
  color:#e6edf3;font-size:1.1rem;cursor:pointer;padding:8px 11px;
  backdrop-filter:blur(18px);pointer-events:all;z-index:30;line-height:1;
  min-width:42px;min-height:42px;display:flex;align-items:center;justify-content:center}

/* ── OVERLAY when panel open ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:19;display:none;pointer-events:all}
#overlay.show{display:block}

/* ── ACTION BUTTONS — bottom bar on mobile, right column on desktop ── */
#btns{position:absolute;
  bottom:max(16px,env(safe-area-inset-bottom)+8px);
  left:50%;transform:translateX(-50%);
  display:flex;flex-direction:row;flex-wrap:wrap;
  gap:8px;pointer-events:all;justify-content:center;
  width:min(420px,96vw)}
.btn{background:rgba(8,9,12,.93);border:1px solid #2a3040;border-radius:10px;
  color:#e6edf3;font-size:clamp(.65rem,3vw,.78rem);cursor:pointer;
  padding:10px 14px;backdrop-filter:blur(18px);transition:all .15s;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  min-height:44px;flex:1;justify-content:center}
.btn:hover,.btn:active{border-color:#4caf50;color:#4caf50;
  background:rgba(76,175,80,.12)}
.btn.on{background:rgba(76,175,80,.18);border-color:#4caf50;color:#4caf50}

/* ── INFO CARD ── */
#card{position:absolute;
  bottom:max(76px,env(safe-area-inset-bottom)+68px);
  left:50%;transform:translateX(-50%) translateY(7px);
  background:rgba(8,9,12,.97);border:1px solid #2a3040;border-radius:12px;
  padding:14px 16px;width:min(300px,90vw);backdrop-filter:blur(20px);
  transition:opacity .25s,transform .25s;opacity:0;pointer-events:none}
#card.show{opacity:1;transform:translateX(-50%) translateY(0)}
#card h2{font-size:clamp(.78rem,3.5vw,.9rem);color:#4caf50;margin-bottom:5px}
#card p{font-size:clamp(.64rem,2.8vw,.72rem);color:#8b949e;line-height:1.55}
#closeCard{position:absolute;top:8px;right:10px;background:none;border:none;
  color:#8b949e;font-size:.9rem;cursor:pointer;pointer-events:all;padding:4px}

/* ── HINT bar ── */
#hint{position:absolute;top:max(58px,env(safe-area-inset-top)+48px);
  left:50%;transform:translateX(-50%);
  display:flex;gap:10px;background:rgba(8,9,12,.75);border:1px solid #2a3040;
  border-radius:28px;padding:5px 14px;font-size:clamp(.52rem,2.2vw,.64rem);
  color:#8b949e;white-space:nowrap;pointer-events:none}
#hint span{display:flex;align-items:center;gap:4px}
kbd{background:#1a1f28;border:1px solid #2a3040;border-radius:3px;
  padding:1px 4px;font-size:.58rem;color:#e6edf3}

/* ── Desktop overrides (≥640px) — restore original side-panel layout ── */
@media(min-width:640px){
  #menuBtn{display:none}
  #panel{position:absolute;top:78px;left:14px;bottom:auto;
    transform:none!important;border-right:none;border-radius:11px;
    width:188px;max-height:80vh;padding:12px 11px}
  #overlay{display:none!important}
  #btns{bottom:auto;top:78px;right:14px;left:auto;transform:none;
    flex-direction:column;width:auto;flex-wrap:nowrap}
  .btn{flex:none;justify-content:flex-start}
  #card{left:auto;right:14px;transform:translateY(7px);
    bottom:78px;width:240px}
  #card.show{transform:translateY(0)}
  #hint{top:auto;bottom:16px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"></div>
<div id="ui">
  <div id="hdr">
    <div style="margin-left:48px">
      <h1>DustCart <em>PRO</em></h1>
      <p>Interactive 3D — tap any part to inspect</p>
    </div>
    <div id="badge">PUSH. CLEAN. DONE.</div>
  </div>
  <button id="menuBtn" aria-label="Toggle parts menu">☰</button>
  <div id="panel"><h3>Parts</h3></div>
  <div id="btns">
    <button class="btn on" id="rotBtn">🔄 Rotate</button>
    <button class="btn" id="exBtn">💥 Explode</button>
    <button class="btn" id="ejBtn">🗑️ Eject Bin</button>
    <button class="btn" id="rstBtn">⟳ Reset</button>
  </div>
  <div id="card">
    <button id="closeCard">✕</button>
    <h2 id="ct"></h2><p id="cd"></p>
  </div>
  <div id="hint">
    <span>👆 Rotate</span>
    <span>🤏 Pinch zoom</span>
    <span>✌️ Pan</span>
  </div>
</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const H2 = Math.PI / 2, PI = Math.PI;
const W = () => window.innerWidth, H = () => window.innerHeight;

/* ── Renderer ── */
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

/* ── Scene & Camera ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1014);
scene.fog = new THREE.FogExp2(0x0e1014, 0.022);

const camera = new THREE.PerspectiveCamera(40, W() / H(), 0.1, 100);
camera.position.set(5.5, 3.2, 6.0);

const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true; orbit.dampingFactor = 0.07;
orbit.minDistance = 2; orbit.maxDistance = 20;
orbit.target.set(0, 1.0, 0);

/* ── Lights ── */
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 2.4);
sun.position.set(5, 12, 7); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-7; sun.shadow.camera.right=7;
sun.shadow.camera.top=8; sun.shadow.camera.bottom=-4;
sun.shadow.camera.far=35;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x7799cc, 0.5);
fill.position.set(-6, 5, -5); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.35);
rim.position.set(0, 3, -8); scene.add(rim);
const ptGreen = new THREE.PointLight(0x4caf50, 0.25, 12);
ptGreen.position.set(-2, 4, 2); scene.add(ptGreen);

/* ── Ground ── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x111418, roughness: 0.95, metalness: 0.0 })
);
ground.rotation.x = -H2; ground.receiveShadow = true; scene.add(ground);
scene.add(new THREE.GridHelper(24, 24, 0x1a2030, 0x1a2030));

/* ── Materials ── */
const mat = {
  bodyGreen   : () => new THREE.MeshStandardMaterial({ color: 0x3a7a3e, roughness: 0.38, metalness: 0.08 }),
  hoodGreen   : () => new THREE.MeshStandardMaterial({ color: 0x3d8a42, roughness: 0.32, metalness: 0.10 }),
  bodyBlack   : () => new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.55, metalness: 0.28 }),
  sidePanel   : () => new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.50, metalness: 0.30 }),
  tyre        : () => new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.97, metalness: 0.01 }),
  hubGrey     : () => new THREE.MeshStandardMaterial({ color: 0x2a2a2e, roughness: 0.65, metalness: 0.55 }),
  hubRing     : () => new THREE.MeshStandardMaterial({ color: 0x4caf50, roughness: 0.20, metalness: 0.10 }),
  brushCore   : () => new THREE.MeshStandardMaterial({ color: 0x1e3e22, roughness: 0.60, metalness: 0.12 }),
  bristle     : () => new THREE.MeshStandardMaterial({ color: 0x2d6e35, roughness: 0.55, metalness: 0.05 }),
  bristleDk   : () => new THREE.MeshStandardMaterial({ color: 0x1a4820, roughness: 0.65, metalness: 0.03 }),
  aluminum    : () => new THREE.MeshStandardMaterial({ color: 0xb0b8c0, roughness: 0.18, metalness: 0.88 }),
  rubberGrip  : () => new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.92, metalness: 0.02 }),
  chrome      : () => new THREE.MeshStandardMaterial({ color: 0xccd0d5, roughness: 0.08, metalness: 0.95 }),
  lidGreen    : () => new THREE.MeshStandardMaterial({ color: 0x2f6e33, roughness: 0.40, metalness: 0.12 }),
  darkGrey    : () => new THREE.MeshStandardMaterial({ color: 0x303035, roughness: 0.70, metalness: 0.45 }),
  intakeBlack : () => new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.85, metalness: 0.05 }),
};

/* ── Scene root & registries ── */
const root = new THREE.Group(); scene.add(root);
const reg = {}, allMeshes = [], origMat = new Map();

function registerMesh(name, mesh, origin) {
  if (!reg[name]) reg[name] = { meshes:[], origins:[] };
  reg[name].meshes.push(mesh);
  reg[name].origins.push(origin.clone());
  allMeshes.push(mesh);
  origMat.set(mesh, mesh.material);
}

/* ── Add helper: mesh to root ── */
function A(name, geo, matFn, px, py, pz, rx, ry, rz) {
  rx=rx||0; ry=ry||0; rz=rz||0;
  const m = new THREE.Mesh(geo, matFn());
  m.position.set(px,py,pz); m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  m.userData.part=name; root.add(m);
  registerMesh(name, m, new THREE.Vector3(px,py,pz));
  return m;
}

/* ── Add helper: mesh to a group ── */
function AG(grp, name, geo, matFn, px, py, pz, rx, ry, rz) {
  rx=rx||0; ry=ry||0; rz=rz||0;
  const m = new THREE.Mesh(geo, matFn());
  m.position.set(px,py,pz); m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  m.userData.part=name; grp.add(m);
  registerMesh(name, m, new THREE.Vector3(px,py,pz));
  return m;
}

/* =====================================================================
   BODY DIMENSIONS  (real-world 54cm W × 70cm D × 95cm H ≈ scale 1u=14cm)
   Width  X: ±1.93  (54cm)
   Depth  Z: -1.70(front) to +1.70(rear mouth)  (70cm? adjusted for shape)
   Rear max height: 2.80  (≈95cm total to handle top)
   Body top at rear: y=1.55
   Body top at front-lip: y=0.30  (wedge)
   Wheel radius: 0.54  (large rear), 0.17 (front caster)
===================================================================== */

/* =====================================================================
   1. MAIN BODY SHELL — wedge shape built from layered cross-sections
      We approximate the curved wedge with a LatheGeometry-derived
      side profile + BoxGeometry slabs + CylinderGeometry for the hood.
===================================================================== */

/* --- Base slab (bottom floor of body) --- */
A('Body', new THREE.BoxGeometry(3.86, 0.12, 3.40), mat.bodyBlack, 0, 0.06, 0);

/* --- Rear wall (tall vertical back) --- */
A('Body', new THREE.BoxGeometry(3.86, 1.62, 0.16), mat.bodyBlack, 0, 0.87, 1.64);

/* --- Upper rear box (the large enclosed bin housing) --- */
A('Body', new THREE.BoxGeometry(3.86, 1.28, 2.80), mat.bodyBlack, 0, 0.76, 0.28);

/* --- Rear top cap --- */
A('Body', new THREE.BoxGeometry(3.86, 0.14, 2.96), mat.bodyBlack, 0, 1.43, 0.30);

/* --- Left inner wall slab (slightly inset) --- */
A('Body', new THREE.BoxGeometry(0.14, 1.28, 2.80), mat.bodyBlack, -1.86, 0.76, 0.28);
/* --- Right inner wall slab --- */
A('Body', new THREE.BoxGeometry(0.14, 1.28, 2.80), mat.bodyBlack,  1.86, 0.76, 0.28);

/* =====================================================================
   2. GREEN UPPER SHELL — follows the wedge profile over the body
      Body total width = 3.86 (inner walls at ±1.90, outer side panels at ±2.00)
      Shell width = 3.80 — sits flush on top of body, no side overhang.
      Rear top: y=1.50, z=+1.56  →  Front lip: y=0.32, z=-1.50
      Angle = atan2(1.18, 3.06) ≈ 0.368 rad
===================================================================== */
{
  const sA  = Math.atan2(1.18, 3.06);
  const sL  = Math.sqrt(1.18*1.18 + 3.06*3.06);
  const T   = 0.20;
  const hT  = T * 0.5;
  const cy  = (1.50+0.32)*0.5 + hT*Math.cos(sA) + 0.04;
  /* Width 3.80 — exactly matches body top, no side protrusion */
  A('Green Shell', new THREE.BoxGeometry(3.80, T, sL), mat.hoodGreen,
    0, cy, -0.02, -sA, 0, 0);

  /* Louvre ridges on shell */
  for (let i=0; i<5; i++) {
    const t = (i+0.5)/5;
    const lz = -sL/2 + t*sL;
    const wz = lz*Math.cos(sA);
    const wy = cy + lz*Math.sin(sA) + hT*Math.cos(sA) + 0.020;
    A('Green Shell', new THREE.BoxGeometry(3.60, 0.030, 0.050), mat.lidGreen,
      0, wy, wz, -sA, 0, 0);
  }
}

/* --- Top access lid (small rectangle near centre-rear of shell) --- */
A('Green Shell', new THREE.BoxGeometry(1.10, 0.08, 0.72), mat.lidGreen, 0, 1.48, 0.62);
/* Lid hinge strip */
A('Green Shell', new THREE.BoxGeometry(1.18, 0.05, 0.06), mat.bodyBlack, 0, 1.50, 0.28);
/* Lid latch nub */
A('Green Shell', new THREE.BoxGeometry(0.18, 0.06, 0.10), mat.bodyBlack, 0, 1.52, 1.00);

/* =====================================================================
   3. BLACK SIDE PANELS — flush against the outer body walls (x=±1.97)
      Body outer face is at x=±1.93 (half of 3.86).
      Side panels: thickness 0.14, centred at x=±1.97 so outer face=±2.04.
      Two segments: rear tall (full height) + front shorter (tapers with wedge).
===================================================================== */
/* Left side — rear tall */
A('Side Panels', new THREE.BoxGeometry(0.14, 1.44, 2.80), mat.sidePanel, -1.97, 0.78, 0.28);
/* Left side — front lower */
A('Side Panels', new THREE.BoxGeometry(0.14, 0.72, 1.50), mat.sidePanel, -1.97, 0.37, -0.97);
/* Right side — rear tall */
A('Side Panels', new THREE.BoxGeometry(0.14, 1.44, 2.80), mat.sidePanel,  1.97, 0.78, 0.28);
/* Right side — front lower */
A('Side Panels', new THREE.BoxGeometry(0.14, 0.72, 1.50), mat.sidePanel,  1.97, 0.37, -0.97);

/* =====================================================================
   4. SLOPED FRONT HOOD / INTAKE (like the reference lawn sweeper image)
      The intake opening is at the very front, facing forward (−Z).
      A dramatically curved hood sweeps up from the ground to cover the brush,
      creating a smooth sloped wedge profile.
      We use a larger radius and extended arc for a more aggressive slope.
===================================================================== */
/* Hood — main curved arc with extended radius for dramatic slope
   Width = 3.94 to span exactly from side panel outer face to outer face (±2.04 → 4.08, minus wall thickness) */
{
  /* Larger radius (1.10 instead of 0.70) creates a more pronounced slope */
  const hoodOuter = new THREE.CylinderGeometry(1.10, 1.10, 3.94, 48, 1, true, -H2*0.12, H2*1.35);
  const hoodMesh = new THREE.Mesh(hoodOuter, mat.hoodGreen());
  hoodMesh.position.set(0, 0.52, -1.60);
  hoodMesh.rotation.set(0.18, 0, H2);   // Slight forward tilt for slope effect
  hoodMesh.castShadow = true;
  hoodMesh.receiveShadow = true;
  hoodMesh.userData.part = 'Hood';
  root.add(hoodMesh);
  registerMesh('Hood', hoodMesh, new THREE.Vector3(0, 0.52, -1.60));
}

/* Hood inner black liner */
{
  const hoodInner = new THREE.CylinderGeometry(1.00, 1.00, 3.96, 44, 1, true, -H2*0.12, H2*1.35);
  const hoodIn = new THREE.Mesh(hoodInner, mat.intakeBlack());
  hoodIn.position.set(0, 0.52, -1.60);
  hoodIn.rotation.set(0.18, 0, H2);
  hoodIn.userData.part = 'Hood';
  root.add(hoodIn);
  registerMesh('Hood', hoodIn, new THREE.Vector3(0, 0.52, -1.60));
}

/* Hood side cheeks — sit flush at the outer face of the side panels (x=±2.04) */
A('Hood', new THREE.CylinderGeometry(1.10, 1.10, 0.13, 36, 1, false, -H2*0.12, H2*1.35),
  mat.hoodGreen, -2.04, 0.52, -1.60, 0.18, 0, H2);
A('Hood', new THREE.CylinderGeometry(1.10, 1.10, 0.13, 36, 1, false, -H2*0.12, H2*1.35),
  mat.hoodGreen,  2.04, 0.52, -1.60, 0.18, 0, H2);

/* Extended sloped front panel — creates the wedge leading edge */
{
  const slopeAngle = 0.52;   // approx 30° from horizontal
  const slopeLength = 0.80;
  const slopeMidY = 0.24;
  const slopeMidZ = -1.90;
  A('Hood', new THREE.BoxGeometry(4.08, 0.14, slopeLength), mat.hoodGreen,
    0, slopeMidY, slopeMidZ, -slopeAngle, 0, 0);
}

/* Intake lip — a flat bar along the bottom front edge */
A('Hood', new THREE.BoxGeometry(4.08, 0.08, 0.16), mat.bodyBlack, 0, 0.04, -1.70);

/* Hood-to-body transition fillet strip */
A('Hood', new THREE.BoxGeometry(3.90, 0.12, 0.24), mat.hoodGreen, 0, 1.10, -1.30);

/* =====================================================================
   5. BRUSH ROLLER
      Centre: x=0, y=0.20, z=-1.48  (just inside the intake)
      Radius 0.20, width 3.76 (almost full body width)
===================================================================== */
const BRUSH_R  = 0.200;
const BRUSH_Y  = BRUSH_R;        // bottom just touches ground
const BRUSH_Z  = -1.50;
const BRUSH_HW = 1.88;           // half-width

const brushGrp = new THREE.Group();
root.add(brushGrp);

function addBrush(geo, matFn, px, py, pz, rx, ry, rz) {
  rx=rx||0; ry=ry||0; rz=rz||0;
  const m = new THREE.Mesh(geo, matFn());
  m.position.set(px,py,pz); m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.userData.part='Brush Roller'; brushGrp.add(m);
  registerMesh('Brush Roller', m, new THREE.Vector3(px,py,pz));
}

/* Central dark core cylinder — axis along X */
addBrush(new THREE.CylinderGeometry(BRUSH_R, BRUSH_R, BRUSH_HW*2, 36),
  mat.brushCore, 0, BRUSH_Y, BRUSH_Z, 0, 0, H2);

/* Dense bristle tufts — 28 torus rings, alternating dark/mid green */
const N_RINGS = 28;
for (let ri=0; ri<N_RINGS; ri++) {
  const bx = -BRUSH_HW + (ri/(N_RINGS-1))*BRUSH_HW*2;
  addBrush(new THREE.TorusGeometry(BRUSH_R+0.028, 0.016, 10, 30),
    ri%2===0 ? mat.bristle : mat.bristleDk,
    bx, BRUSH_Y, BRUSH_Z, H2, 0, 0);
}

/* Secondary small rings between main rings */
for (let ri=0; ri<N_RINGS-1; ri++) {
  const step = (BRUSH_HW*2)/(N_RINGS-1);
  const bx = -BRUSH_HW + ri*step + step*0.5;
  addBrush(new THREE.TorusGeometry(BRUSH_R+0.014, 0.009, 8, 26),
    mat.bristleDk, bx, BRUSH_Y, BRUSH_Z, H2, 0, 0);
}

/* Chrome end-caps */
addBrush(new THREE.CylinderGeometry(BRUSH_R+0.035, BRUSH_R+0.035, 0.045, 24),

{
  /* Build the logo canvas once, reuse as texture */
  function makeLogoTexture() {
    const cw = 512, ch = 180;
    const cv = document.createElement('canvas');
    cv.width = cw; cv.height = ch;
    const ctx = cv.getContext('2d');

    /* Background: dark green rounded rect */
    ctx.fillStyle = '#1a3d20';
    roundRect(ctx, 0, 0, cw, ch, 18);
    ctx.fill();

    /* Green border */
    ctx.strokeStyle = '#4caf50';
    ctx.lineWidth = 5;
    roundRect(ctx, 4, 4, cw-8, ch-8, 14);
    ctx.stroke();

    /* "DUSTCART" — large bold white */
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 72px Arial Black, Arial, sans-serif';
    ctx.letterSpacing = '4px';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('DUSTCART', cw*0.5, ch*0.40);

    /* "PRO" — bright green, smaller, below */
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 46px Arial Black, Arial, sans-serif';
    ctx.letterSpacing = '8px';
    ctx.fillText('PRO', cw*0.5, ch*0.78);

    /* Small leaf icon to the left of DUSTCART */
    ctx.fillStyle = '#4caf50';
    ctx.font = '38px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🌿', 22, ch*0.42);

    return new THREE.CanvasTexture(cv);
  }

  /* Helper: rounded rect path */
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,   x+w,y+r,   r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,   x,y+h-r,   r);
    ctx.lineTo(x, y+r); ctx.arcTo(x,y,     x+r,y,     r);
    ctx.closePath();
  }

  const logoTex = makeLogoTexture();
  logoTex.encoding = THREE.sRGBEncoding;

  /* Logo panel geometry: W=1.40 (Z depth), H=0.42 (Y height), depth=0.025 */
  const logoPanelGeo = new THREE.BoxGeometry(0.025, 0.42, 1.40);

  /* Left side — faces outward (-X), texture on the left face */
  const logoMatL = new THREE.MeshStandardMaterial({
    map: logoTex, roughness: 0.35, metalness: 0.10 });
  /* Right side — need mirrored texture so text reads correctly */
  function makeLogoTextureMirrored() {
    const cw = 512, ch = 180;
    const cv = document.createElement('canvas');
    cv.width = cw; cv.height = ch;
    const ctx = cv.getContext('2d');
    /* Mirror horizontally */
    ctx.translate(cw, 0); ctx.scale(-1, 1);
    /* Reuse same drawing code */
    ctx.fillStyle = '#1a3d20';
    roundRect(ctx, 0, 0, cw, ch, 18); ctx.fill();
    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 5;
    roundRect(ctx, 4, 4, cw-8, ch-8, 14); ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 72px Arial Black, Arial, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('DUSTCART', cw*0.5, ch*0.40);
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 46px Arial Black, Arial, sans-serif';
    ctx.fillText('PRO', cw*0.5, ch*0.78);
    ctx.fillStyle = '#4caf50'; ctx.font = '38px sans-serif';
    ctx.textAlign = 'right'; ctx.fillText('🌿', cw-22, ch*0.42);
    const t = new THREE.CanvasTexture(cv);
    t.encoding = THREE.sRGBEncoding;
    return t;
  }
  const logoTexR = makeLogoTextureMirrored();

  /* Six-face materials: only the outward face gets the logo */
  /* BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z */
  const blankMat = () => new THREE.MeshStandardMaterial({ color:0x1a3d20, roughness:0.40 });

  /* Left panel at x=-2.055: outward face = -X = index 1 */
  const matsL = [blankMat(),
    new THREE.MeshStandardMaterial({ map: logoTex, roughness:0.35 }),
    blankMat(), blankMat(), blankMat(), blankMat()];
  const meshL = new THREE.Mesh(logoPanelGeo, matsL);
  meshL.position.set(-2.055, 0.62, -0.12);
  meshL.castShadow = true; meshL.userData.part = 'Side Panels';
  root.add(meshL); registerMesh('Side Panels', meshL, new THREE.Vector3(-2.055, 0.62, -0.12));

  /* Right panel at x=+2.055: outward face = +X = index 0 */
  const matsR = [
    new THREE.MeshStandardMaterial({ map: logoTexR, roughness:0.35 }),
    blankMat(), blankMat(), blankMat(), blankMat(), blankMat()];
  const meshR = new THREE.Mesh(logoPanelGeo, matsR);
  meshR.position.set( 2.055, 0.62, -0.12);
  meshR.castShadow = true; meshR.userData.part = 'Side Panels';
  root.add(meshR); registerMesh('Side Panels', meshR, new THREE.Vector3(2.055, 0.62, -0.12));
}

/* Rear brand plate — flush on rear wall face */
A('Body', new THREE.BoxGeometry(1.60, 0.24, 0.030), mat.hoodGreen, 0, 1.00, 1.73);

/* Sensor box on top rear */
A('Green Shell', new THREE.BoxGeometry(0.44,0.10,0.32), mat.bodyBlack, 0, 1.58, 1.20);
A('Green Shell', new THREE.BoxGeometry(0.28,0.14,0.20), mat.darkGrey, 0, 1.66, 1.20);

/* Rubber bumper strip along bottom front */
A('Hood', new THREE.BoxGeometry(4.08, 0.06, 0.14), mat.rubberGrip, 0, 0.03, -1.65);

/* =====================================================================
   11. GROUND DEBRIS
===================================================================== */
const debPal = [0x8B7355,0xa09060,0x6B8E23,0x556B2F,0xb8a070,0x7a9040];
const debList = [];
for (let i=0; i<24; i++) {
  let dg; const dr = Math.random();
  if (dr<0.40) dg = new THREE.BoxGeometry(0.07+Math.random()*0.11,0.011,0.06+Math.random()*0.10);
  else if (dr<0.75) dg = new THREE.PlaneGeometry(0.08+Math.random()*0.12,0.06+Math.random()*0.10);
  else dg = new THREE.SphereGeometry(0.025+Math.random()*0.030,6,5);
  const dm = new THREE.Mesh(dg, new THREE.MeshStandardMaterial({
    color: debPal[Math.floor(Math.random()*debPal.length)],
    roughness:0.92, side:THREE.DoubleSide }));
  dm.position.set((Math.random()-0.5)*3.6, 0.012, -1.80-Math.random()*2.0);
  dm.rotation.set(Math.random()*0.3,Math.random()*PI*2,Math.random()*0.3);
  dm.castShadow=true; root.add(dm);
  debList.push({ mesh:dm, phase:Math.random()*PI*2, spd:0.5+Math.random()*0.7 });
}

===================================================================== */

/* =====================================================================
   EXPLODE VECTORS
===================================================================== */
const EXPLODE = {
  'Body'         : new THREE.Vector3( 0.0, -0.40,  0.30),
  'Green Shell'  : new THREE.Vector3( 0.0,  2.20, -0.30),
  'Hood'         : new THREE.Vector3( 0.0,  0.50, -2.80),
  'Side Panels'  : new THREE.Vector3( 2.40,  0.20,  0.00),
  'Brush Roller' : new THREE.Vector3( 0.0,  0.40, -3.20),
  'Rear Wheels'  : new THREE.Vector3( 2.20,  0.20,  0.50),
  'Front Casters': new THREE.Vector3( 0.0, -0.80, -2.40),
  'Push Handle'  : new THREE.Vector3( 0.0,  2.60,  1.60),
  'Waste Bin'    : new THREE.Vector3( 0.0, -1.40,  0.80),
  'Collection Tray': new THREE.Vector3( 0.0, -2.20,  0.40),
};

/* =====================================================================
   UI — build part buttons
===================================================================== */
const partPanel = document.getElementById('panel');
for (const [nm, pd] of Object.entries(PART_INFO)) {
  const btn = document.createElement('button');
  btn.className='pb'; btn.dataset.p=nm;
  btn.innerHTML=`<span class="dot" style="background:${pd.color}"></span>${nm}`;
  btn.addEventListener('click', () => {
    selectPart(nm, btn);
    /* Close slide-out panel on mobile after selecting */
    panel.classList.remove('open');
    overlay.classList.remove('show');
  });
  partPanel.appendChild(btn);
}

/* =====================================================================
   SELECTION / HIGHLIGHT
===================================================================== */
let selPart=null, selBtn=null;
const hlMat = new THREE.MeshStandardMaterial({
  color:0x4caf50, roughness:0.18, metalness:0.25,
  emissive:0x1a5020, emissiveIntensity:0.90 });

function selectPart(nm, btn) {
  if (selPart) {
    reg[selPart]?.meshes.forEach(m=>{ m.material=origMat.get(m); });
    selBtn?.classList.remove('on');
  }
  if (selPart===nm) { selPart=null; selBtn=null;
    document.getElementById('card').classList.remove('show'); return; }
  selPart=nm; selBtn=btn; btn?.classList.add('on');
  reg[nm]?.meshes.forEach(m=>{ m.material=hlMat; });
  document.getElementById('ct').textContent=nm;
  document.getElementById('cd').textContent=PART_INFO[nm]?.desc||'';
  document.getElementById('card').classList.add('show');
}

/* =====================================================================
   RAYCASTING
===================================================================== */
const raycaster=new THREE.Raycaster(), mouseV=new THREE.Vector2();
renderer.domElement.addEventListener('click', e=>{
  mouseV.x=(e.clientX/W())*2-1;
  mouseV.y=-(e.clientY/H())*2+1;
  raycaster.setFromCamera(mouseV,camera);
  const hits=raycaster.intersectObjects(allMeshes,false);
  if (hits.length>0) {
    const p=hits[0].object.userData.part;
    if (p) selectPart(p, document.querySelector(`.pb[data-p="${p}"]`));
  }
});

/* =====================================================================
   CONTROLS
===================================================================== */
let autoRot=true, exploded=false, exTimer=0, exDir=0;
let binEjected=false, binTimer=0, binDir=0;
const BIN_EJECT_Y = -0.58;

/* ── Mobile menu toggle ── */
const menuBtn  = document.getElementById('menuBtn');
const panel    = document.getElementById('panel');
const overlay  = document.getElementById('overlay');
menuBtn.addEventListener('click', ()=>{
  panel.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', ()=>{
  panel.classList.remove('open');
  overlay.classList.remove('show');
});

/* ── Close info card ── */
document.getElementById('closeCard').addEventListener('click', ()=>{
  document.getElementById('card').classList.remove('show');
  if (selPart){ reg[selPart]?.meshes.forEach(m=>{m.material=origMat.get(m);});
    selBtn?.classList.remove('on'); selPart=null; selBtn=null; }
});

document.getElementById('rotBtn').addEventListener('click', function(){
  autoRot=!autoRot; this.classList.toggle('on',autoRot); });

document.getElementById('exBtn').addEventListener('click', function(){
  exploded=!exploded; exDir=exploded?1:-1;
  this.classList.toggle('on',exploded);
  this.textContent=exploded?'🔧 Collapse':'💥 Explode'; });

document.getElementById('ejBtn').addEventListener('click', function(){
  binEjected=!binEjected; binDir=binEjected?1:-1;
  this.classList.toggle('on',binEjected);
  this.textContent=binEjected?'🗑️ Dock Bin':'🗑️ Eject Bin'; });

document.getElementById('rstBtn').addEventListener('click', ()=>{
  camera.position.set(5.5,3.2,6.0); orbit.target.set(0,1.0,0); orbit.update();
  root.rotation.y=0;
  if (exploded){ exploded=false; exDir=-1;
    document.getElementById('exBtn').classList.remove('on');
    document.getElementById('exBtn').textContent='💥 Explode'; }
  if (binEjected){ binEjected=false; binDir=-1;
    document.getElementById('ejBtn').classList.remove('on');
    document.getElementById('ejBtn').textContent='🗑️ Eject Bin'; }
  if (selPart){ reg[selPart]?.meshes.forEach(m=>{m.material=origMat.get(m);});
    selBtn?.classList.remove('on'); selPart=null; selBtn=null;
    document.getElementById('card').classList.remove('show'); }
});

/* =====================================================================
   ANIMATION LOOP
===================================================================== */
const easeCubic=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const clk=new THREE.Clock();

(function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clk.getDelta(),0.05);
  const et=clk.elapsedTime;

  if (autoRot) root.rotation.y += dt*0.20;

  debList.forEach(d=>{
    d.mesh.position.y=0.012+Math.sin(et*d.spd+d.phase)*0.007; });

  /* Bin eject / dock animation */
  if (binDir!==0) {
    binTimer=Math.max(0,Math.min(1,binTimer+binDir*dt*1.6));
    const bt=easeCubic(binTimer);
    binTray.position.y = BIN_EJECT_Y * bt;
    if (binTimer===0||binTimer===1) binDir=0;
  }

  /* Explode */
  if (exDir!==0) {
    exTimer=Math.max(0,Math.min(1,exTimer+exDir*dt*1.35));
    const t=easeCubic(exTimer);
    for (const [pk, ev] of Object.entries(EXPLODE)) {
      if (!reg[pk]) continue;
      reg[pk].meshes.forEach((m,i)=>{
        const o=reg[pk].origins[i];
        let vx=ev.x;
        if (pk==='Side Panels') vx = o.x<0 ? -Math.abs(ev.x) : Math.abs(ev.x);
        if (pk==='Rear Wheels') vx = o.x<0 ? -Math.abs(ev.x) : Math.abs(ev.x);
        if (pk==='Front Casters') vx = o.x<0 ? -Math.abs(ev.x)*0.6 : Math.abs(ev.x)*0.6;
        m.position.set(o.x+vx*t, o.y+ev.y*t, o.z+ev.z*t);
      });
    }
    /* Brush roller as group */
    const bev=EXPLODE['Brush Roller'];
    brushGrp.position.set(bev.x*t, bev.y*t, bev.z*t);
    if (exTimer===0||exTimer===1) exDir=0;
  }

  orbit.update();
  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H()); });

</script>
